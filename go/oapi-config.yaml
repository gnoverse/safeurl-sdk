# oapi-codegen config: generate Go client + models.
# Spec lives at the repo root (openapi.json). To regenerate:
#   sh scripts/fetch-openapi.sh          (fetches fresh spec + regenerates all SDKs)
#   go generate ./...                    (regenerates Go client from existing spec)
package: safeurl
generate:
  client: true
  models: true
output: client.gen.go
output-options:
  skip-fmt: false
  # Avoid name clash: schema types like CreateScanResponse vs wrapper type CreateScanResponse
  response-type-suffix: "Resp"
