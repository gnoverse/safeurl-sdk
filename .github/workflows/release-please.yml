name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(fromJSON(steps.release.outputs.paths_released || '[]'), 'ts') }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(fromJSON(steps.release.outputs.paths_released || '[]'), 'ts') }}
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Publish @safeurl/sdk to npm
        if: ${{ steps.release.outputs.releases_created == 'true' && contains(fromJSON(steps.release.outputs.paths_released || '[]'), 'ts') }}
        working-directory: ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install
          npm publish --access public
